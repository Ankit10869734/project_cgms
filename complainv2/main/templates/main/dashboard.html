{% extends "main/base.html" %}

{% block content %}
        
        <!-- DASHBOARD PAGE -->
        <section id="homePage" class="page active">
            <div class="page-header">
                <h1 class="page-title">
                    <span class="title-accent">></span> System Dashboard
                </h1>
                <p class="page-subtitle">Real-time complaint management & analytics</p>
            </div>

            <!-- Statistics Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon pending-icon">◉</div>
                    <div class="stat-content">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="statPending">0</div>
                    </div>
                    <div class="stat-trend up">+2 today</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon progress-icon">◐</div>
                    <div class="stat-content">
                        <div class="stat-label">In Progress</div>
                        <div class="stat-value" id="statProgress">0</div>
                    </div>
                    <div class="stat-trend">Active</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon resolved-icon">◎</div>
                    <div class="stat-content">
                        <div class="stat-label">Resolved</div>
                        <div class="stat-value" id="statResolved">0</div>
                    </div>
                    <div class="stat-trend down">-3 this week</div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon total-icon">◈</div>
                    <div class="stat-content">
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                    <div class="stat-trend">All time</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="section-container">
                <h2 class="section-title">
                    <span class="title-accent">></span> Quick Actions
                </h2>
                <div class="quick-actions">
                    <button class="action-btn primary" id="quickAddComplaint">
                        <span class="btn-icon">+</span>
                        <span>New Complaint</span>
                    </button>
                    <button class="action-btn secondary" data-page="complaints">
                        <span class="btn-icon">◈</span>
                        <span>View All</span>
                    </button>
                    <button class="action-btn secondary" id="exportBtn">
                        <span class="btn-icon">↓</span>
                        <span>Export Data</span>
                    </button>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="section-container">
                <h2 class="section-title">
                    <span class="title-accent">></span> Recent Activity
                </h2>
                <div class="activity-feed" id="activityFeed">
                    <div class="activity-item">
                        <div class="activity-dot"></div>
                        <div class="activity-content">
                            <div class="activity-text">System initialized</div>
                            <div class="activity-time">Just now</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
{% endblock %}
