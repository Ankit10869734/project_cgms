{% extends "main/base.html" %}
{% block navbar %}{% endblock %}  
{% block footer %}{% endblock %}   



{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, .login-page {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
  }

  .login-page {
    width: 100%;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background glow */
  .login-page::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 200, 255, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-modal {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
    position: relative;
    animation: fadeUp 0.4s ease both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-title {
    font-size: 1.75rem;
    font-weight: 600;
    color: #f0f0f0;
    margin-bottom: 0.6rem;
    letter-spacing: -0.02em;
  }

  .modal-subtitle {
    font-size: 0.88rem;
    color: #888;
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.5rem 0;
    color: #444;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #2e2e2e;
  }

  /* Auth buttons */
  .auth-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.65rem;
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid #2e2e2e;
    background: #222;
    color: #d4d4d4;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.12s;
    text-decoration: none;
    margin-bottom: 0.75rem;
  }

  .auth-btn:hover {
    background: #2a2a2a;
    border-color: #3a3a3a;
    color: #fff;
    transform: translateY(-1px);
  }

  .auth-btn:active {
    transform: translateY(0);
  }

  .auth-btn svg {
    flex-shrink: 0;
  }

  .google-btn {
    border-color: #2e2e2e;
  }

  /* Email input */
  .email-input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: #222;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    color: #d4d4d4;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.18s;
  }

  .email-input::placeholder {
    color: #555;
  }

  .email-input:focus {
    border-color: #444;
    background: #252525;
  }

  .continue-btn {
    width: 100%;
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: #f0f0f0;
    color: #111;
    border: none;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
  }

  .continue-btn:hover {
    background: #fff;
    transform: translateY(-1px);
  }

  .footer-note {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: #555;
    line-height: 1.6;
  }

  .footer-note a {
    color: #888;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>

<div class="login-page">
  <div class="login-modal">
    <h1 class="modal-title">Welcome Back</h1>
    <p class="modal-subtitle">Sign in to continue to your account</p>

    <!-- Google -->
    <form method="post" action="/accounts/google/login/" style="margin: 0;">
      {% csrf_token %}
      <button type="submit" class="auth-btn google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>
    <p class="footer-note">
      By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </p>
  </div>
</div>
{% endblock %}
